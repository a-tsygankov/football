name = "fc26-worker"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# Local dev server: listen on every interface so phones on the same Wi-Fi
# can reach the Worker at http://<LAN-IP>:8787. Only affects `wrangler dev`,
# never production.
[dev]
ip = "0.0.0.0"
port = 8787

# Set via wrangler secret put / env:
# - SCHEMA_VERSION (number, matches latest applied migration)
# - MIN_CLIENT_VERSION (semver string)
# - GIT_SHA (build metadata)
[vars]
WORKER_VERSION = "0.1.0"
SCHEMA_VERSION = "5"
MIN_CLIENT_VERSION = "0.1.0"
SESSION_SECRET = "fc26-local-dev-session-secret"
GEMINI_API_KEY=AQ.Ab8RN6I98_2_-wapFkL9pUPC2fv5etWKt8ceKVVTTr52nbw8hg

# Phase 1 bindings. The Worker boots without these (falls back to in-memory
# stores in src/dependencies.ts so the scaffold stays runnable), but the
# /api/squads/* routes need both DB and SQUADS to serve real data.
#
# To provision:
#   wrangler d1 create fc26                       # paste database_id below
#   wrangler r2 bucket create fc26
#   pnpm exec wrangler d1 migrations apply fc26 --local
#
[[d1_databases]]
binding = "DB"
database_name = "fc26"
# Local-first placeholder. Replace with the real Cloudflare D1 UUID before
# production deploys.
database_id = "b0e1922f-6b23-4a37-b125-a71aee4ee8b2"
preview_database_id = "fc26-local-phase-2"
migrations_dir = "src/db/migrations"

[[r2_buckets]]
binding = "SQUADS"
bucket_name = "fc26"
#
# Squad sync + logo retrieval config lives in src/config/squad.ts.
# [triggers]
# crons = ["0 6 * * *"]
