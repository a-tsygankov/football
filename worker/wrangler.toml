name = "fc26-worker"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# Local dev server: listen on every interface so phones on the same Wi-Fi
# can reach the Worker at http://<LAN-IP>:8787. Only affects `wrangler dev`,
# never production.
[dev]
ip = "0.0.0.0"
port = 8787

# Set via wrangler secret put / env:
# - SCHEMA_VERSION (number, matches latest applied migration)
# - MIN_CLIENT_VERSION (semver string)
# - GIT_SHA (build metadata)
[vars]
WORKER_VERSION = "0.1.0"
SCHEMA_VERSION = "1"
MIN_CLIENT_VERSION = "0.1.0"
SESSION_SECRET = "fc26-local-dev-session-secret"
SQUAD_SYNC_RETENTION_COUNT = "12"
# Choose one source mode:
# - json-snapshot: fetch a single full snapshot JSON from SQUAD_SYNC_SOURCE_URL
# - ea-rosterupdate-json: scrape EA's rosterupdate.xml for the latest version,
#   then fetch the normalized snapshot from SQUAD_SYNC_SNAPSHOT_URL_TEMPLATE
#   with {version} and {platform} placeholders.
# - github-release-json: discover the latest GitHub release for a repo, then
#   download a normalized snapshot JSON asset by exact asset name.
# SQUAD_SYNC_SOURCE_KIND = "json-snapshot"
# SQUAD_SYNC_SOURCE_URL = "https://example.com/fc26/latest.json"
# SQUAD_SYNC_SOURCE_KIND = "ea-rosterupdate-json"
# SQUAD_SYNC_DISCOVERY_URL = "https://eafc26.content.easports.com/fc/fltOnlineAssets/26E4D4D6-8DBB-4A9A-BD99-9C47D3AA341D/2026/fc/fclive/genxtitle/rosterupdate.xml"
# SQUAD_SYNC_SNAPSHOT_URL_TEMPLATE = "https://example.com/fc26/{version}.json"
# SQUAD_SYNC_PLATFORM = "PC64"
# SQUAD_SYNC_SOURCE_KIND = "github-release-json"
# SQUAD_SYNC_GITHUB_REPOSITORY = "owner/repo"
# SQUAD_SYNC_GITHUB_ASSET_NAME = "fc26-latest.json"
# SQUAD_SYNC_GITHUB_TOKEN = "" # optional; useful for private repos or higher rate limits
# On-demand club + league logo refresh (triggered from the app Settings panel):
# SQUAD_ASSET_PROVIDER_BASE_URL = "https://www.thesportsdb.com/api/v1/json/123"
# Optional exact-name overrides when EA and provider league names differ.
# SQUAD_ASSET_LEAGUE_ALIASES_JSON = "{\"Premier League\":\"English Premier League\"}"

# Phase 1 bindings. The Worker boots without these (falls back to in-memory
# stores in src/dependencies.ts so the scaffold stays runnable), but the
# /api/squads/* routes need both DB and SQUADS to serve real data.
#
# To provision:
#   wrangler d1 create fc26                       # paste database_id below
#   wrangler r2 bucket create fc26-squads
#   pnpm exec wrangler d1 migrations apply fc26 --local
#
[[d1_databases]]
binding = "DB"
database_name = "fc26"
# Local-first placeholder. Replace with the real Cloudflare D1 UUID before
# production deploys.
database_id = "b0e1922f-6b23-4a37-b125-a71aee4ee8b2"
preview_database_id = "fc26-local-phase-2"
migrations_dir = "src/db/migrations"

# [[r2_buckets]]
# binding = "SQUADS"
# bucket_name = "fc26-squads"
#
# Daily squad sync cron — wired up in Phase 1 once the squad-sync tool lands.
# [triggers]
# crons = ["0 6 * * *"]
